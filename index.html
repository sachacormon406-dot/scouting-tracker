<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joueurs à suivre — Scouting Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8f8f6;color:#1a1a1a;padding:1.5rem}
.wrap{max-width:1400px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:12px}
.title{font-size:20px;font-weight:500;color:#1a1a1a}
.subtitle{font-size:13px;color:#888;margin-top:2px}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{background:transparent;border:0.5px solid #ccc;border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;color:#1a1a1a;transition:background 0.15s}
.btn:hover{background:#f0f0ee}
.btn.primary{background:#dbeafe;border-color:#93c5fd;color:#1e40af;font-weight:500}
.btn.primary:hover{opacity:0.85}
.btn.danger{color:#b91c1c;border-color:#fca5a5}
.btn.danger:hover{background:#fef2f2}
.btn.success{background:#dcfce7;border-color:#86efac;color:#166534;font-weight:500}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:1.5rem}
@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:#fff;border-radius:8px;padding:12px 14px;border:0.5px solid #e5e5e3}
.stat-label{font-size:12px;color:#888;margin-bottom:4px}
.stat-val{font-size:20px;font-weight:500;color:#1a1a1a}
.filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:1.25rem}
.filters input,.filters select{width:100%;font-size:13px;padding:7px 10px;border-radius:8px;border:0.5px solid #ddd;background:#fff;color:#1a1a1a}
.table-wrap{overflow-x:auto;border:0.5px solid #e5e5e3;border-radius:12px;background:#fff}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:#f8f8f6;position:sticky;top:0;z-index:1}
th{padding:10px 10px;text-align:left;font-weight:500;font-size:11px;color:#888;white-space:nowrap;border-bottom:0.5px solid #e5e5e3;cursor:pointer;user-select:none}
th:hover{color:#1a1a1a}
td{padding:8px 10px;border-bottom:0.5px solid #e5e5e3;color:#1a1a1a;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-gb{background:#f3e8ff;color:#6b21a8}
.badge-dd,.badge-dc,.badge-dg{background:#dcfce7;color:#166534}
.badge-mdc,.badge-mc,.badge-moc{background:#fef9c3;color:#854d0e}
.badge-ad,.badge-ag,.badge-bu{background:#ffedd5;color:#9a3412}
.stars{color:#f59e0b;font-size:12px;white-space:nowrap}
.vm-cell{font-variant-numeric:tabular-nums;white-space:nowrap}
.evol-up{color:#16a34a;font-size:10px}
.evol-dn{color:#dc2626;font-size:10px}
.notes-cell{max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#888;font-size:12px}
.age-warn{color:#b45309;font-size:10px}
.empty{text-align:center;padding:3rem;color:#bbb}
.count{font-size:12px;color:#888;margin-bottom:8px}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:2rem 1rem;overflow-y:auto}
.modal{background:#fff;border:0.5px solid #e5e5e3;border-radius:12px;padding:1.5rem;width:100%;max-width:560px;margin:auto}
.modal-title{font-size:16px;font-weight:500;margin-bottom:1.25rem;color:#1a1a1a}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid .full{grid-column:1/-1}
label{display:block;font-size:12px;color:#888;margin-bottom:4px}
.form-grid input,.form-grid select,.form-grid textarea{width:100%;font-size:13px;padding:7px 10px;border-radius:8px;border:0.5px solid #ddd;background:#fff;color:#1a1a1a}
.form-grid textarea{resize:vertical;min-height:60px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem}
.age-warn-form{font-size:11px;color:#b45309;margin-top:3px;display:none}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <div class="title">Joueurs à suivre</div>
      <div class="subtitle">U23 max — VM max 20M€ — <span id="date-display"></span></div>
    </div>
    <div class="actions">
      <button class="btn success" onclick="loadPreloaded()" id="btn-preload">⬇ Charger ma liste (245 joueurs)</button>
      <button class="btn primary" onclick="openModal()">+ Ajouter un joueur</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total joueurs</div><div class="stat-val" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">VM moy. actuelle</div><div class="stat-val" id="s-vm">—</div></div>
    <div class="stat"><div class="stat-label">Âge moyen</div><div class="stat-val" id="s-age">—</div></div>
    <div class="stat"><div class="stat-label">Postes différents</div><div class="stat-val" id="s-postes">—</div></div>
    <div class="stat"><div class="stat-label">Plus-value totale</div><div class="stat-val" id="s-plusvalue">—</div></div>
  </div>

  <div class="filters">
    <input type="text" id="f-search" placeholder="🔍 Rechercher..." oninput="render()">
    <select id="f-poste" onchange="render()">
      <option value="">Tous les postes</option>
      <option>GB</option><option>DD</option><option>DC</option><option>DG</option>
      <option>MDC</option><option>MC</option><option>MOC</option>
      <option>AD</option><option>AG</option><option>BU</option>
    </select>
    <select id="f-stars" onchange="render()">
      <option value="">Toutes notes</option>
      <option value="5">5★</option><option value="4.5">4.5★</option><option value="4">4★+</option>
      <option value="3">3★+</option><option value="0">À voir</option>
    </select>
    <input type="number" id="f-age-max" placeholder="Âge max" min="13" max="25" oninput="render()">
    <input type="number" id="f-vm-max" placeholder="VM max (M€)" step="0.5" oninput="render()">
    <select id="f-sort" onchange="render()">
      <option value="stars_desc">Note ↓</option>
      <option value="date_desc">Date ↓</option>
      <option value="date_asc">Date ↑</option>
      <option value="age_asc">Âge ↑</option>
      <option value="age_desc">Âge ↓</option>
      <option value="vm_desc">VM ↓</option>
      <option value="vm_asc">VM ↑</option>
      <option value="evol_desc">Plus-value ↓</option>
      <option value="nom_asc">Nom A→Z</option>
    </select>
  </div>

  <div class="count" id="count-line"></div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Nom</th>
          <th>Poste</th>
          <th>Âge</th>
          <th>Note</th>
          <th>Club</th>
          <th>Nationalité</th>
          <th>VM ajout</th>
          <th>VM actuelle</th>
          <th>Évolution</th>
          <th>Style</th>
          <th>Notes</th>
          <th>Date ajout</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="empty-state" class="empty" style="display:none">Aucun joueur trouvé</div>
  </div>
</div>

<div class="modal-bg" id="modal" style="display:none" onclick="bgClick(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Nouveau joueur</div>
    <div class="form-grid">
      <div class="full">
        <label>Nom complet *</label>
        <input type="text" id="f-nom" placeholder="ex: Kylian Mbappé">
      </div>
      <div>
        <label>Poste *</label>
        <select id="f-fposte">
          <option value="">— choisir —</option>
          <option>GB</option><option>DD</option><option>DC</option><option>DG</option>
          <option>MDC</option><option>MC</option><option>MOC</option>
          <option>AD</option><option>AG</option><option>BU</option>
        </select>
      </div>
      <div>
        <label>Âge</label>
        <input type="number" id="f-fage" min="13" max="40" placeholder="ex: 19" oninput="checkAge()">
        <div class="age-warn-form" id="age-warn">⚠ Plus de 23 ans (hors critère U23)</div>
      </div>
      <div>
        <label>Note (★)</label>
        <select id="f-fstars">
          <option value="">À voir</option>
          <option value="1">1★</option><option value="1.5">1.5★</option>
          <option value="2">2★</option><option value="2.5">2.5★</option>
          <option value="3">3★</option><option value="3.5">3.5★</option>
          <option value="4">4★</option><option value="4.5">4.5★</option>
          <option value="5">5★</option>
        </select>
      </div>
      <div>
        <label>Nationalité</label>
        <input type="text" id="f-fnat" placeholder="ex: Français">
      </div>
      <div>
        <label>Club actuel</label>
        <input type="text" id="f-fclub" placeholder="ex: RC Lens">
      </div>
      <div>
        <label>VM à l'ajout (M€)</label>
        <input type="number" id="f-fvmadd" step="0.1" min="0" placeholder="ex: 5">
      </div>
      <div>
        <label>VM actuelle (M€)</label>
        <input type="number" id="f-fvm" step="0.1" min="0" placeholder="ex: 5">
      </div>
      <div class="full">
        <label>Date d'ajout</label>
        <input type="date" id="f-fdate">
      </div>
      <div class="full">
        <label>Style de joueur</label>
        <input type="text" id="f-fstyle" placeholder="ex: Ailier technique, bon dribbleur">
      </div>
      <div class="full">
        <label>Notes / commentaires</label>
        <textarea id="f-fnotes" placeholder="Observations, matchs vus, points à surveiller..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn primary" onclick="savePlayer()">Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let players=[];
let editId=null;

function load(){try{const d=localStorage.getItem('scouting_v3');players=d?JSON.parse(d):[];}catch(e){players=[];}}
function save(){try{localStorage.setItem('scouting_v3',JSON.stringify(players));}catch(e){}}

function loadPreloaded(){
  if(players.length>0&&!confirm('Cela va remplacer les '+players.length+' joueurs actuels par les 245 joueurs pré-chargés. Continuer ?'))return;
  players=PRELOADED.map(p=>({...p}));
  save();render();
  showToast('245 joueurs chargés avec succès !');
  document.getElementById('btn-preload').style.display='none';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function fmt(v){
  if(v==null||v===''||v==='0')return'0M€';
  const n=parseFloat(v);
  if(isNaN(n))return'—';
  if(n===0)return'0M€';
  if(n<1)return(n*1000).toFixed(0)+'k€';
  return n%1===0?n+'M€':n.toFixed(1)+'M€';
}
function fmtDate(d){
  if(!d)return'—';
  const p=d.split('-');
  if(p.length!==3)return d;
  return p[2]+'/'+p[1]+'/'+p[0];
}
function starsNum(p){
  const s=p.style||'';
  const m=s.match(/^([\d\.]+)★/);
  return m?parseFloat(m[1]):null;
}
function starsDisplay(p){
  const n=starsNum(p);
  if(!n)return'<span style="color:#bbb;font-size:11px">à voir</span>';
  const full=Math.floor(n);
  const half=n%1>=0.5;
  let out='';
  for(let i=0;i<full;i++)out+='★';
  if(half)out+='½';
  return`<span class="stars">${out}</span><span style="font-size:11px;color:#888;margin-left:2px">${n}</span>`;
}

function updateStats(list){
  document.getElementById('s-total').textContent=list.length;
  const vms=list.map(p=>parseFloat(p.vm)).filter(v=>!isNaN(v)&&v>0);
  document.getElementById('s-vm').textContent=vms.length?(vms.reduce((a,b)=>a+b,0)/vms.length).toFixed(1)+'M€':'—';
  const ages=list.map(p=>parseInt(p.age)).filter(v=>!isNaN(v));
  document.getElementById('s-age').textContent=ages.length?(ages.reduce((a,b)=>a+b,0)/ages.length).toFixed(1):'—';
  const postes=[...new Set(list.map(p=>p.poste).filter(Boolean))];
  document.getElementById('s-postes').textContent=postes.length||'—';
  let plusval=0;
  list.forEach(p=>{
    const va=parseFloat(p.vm_add)||0;
    const vc=parseFloat(p.vm)||0;
    plusval+=(vc-va);
  });
  const sign=plusval>=0?'+':'';
  document.getElementById('s-plusvalue').textContent=sign+plusval.toFixed(1)+'M€';
}

function render(){
  load();
  const search=document.getElementById('f-search').value.toLowerCase();
  const poste=document.getElementById('f-poste').value;
  const starsFilter=document.getElementById('f-stars').value;
  const ageMax=document.getElementById('f-age-max').value;
  const vmMax=document.getElementById('f-vm-max').value;
  const sort=document.getElementById('f-sort').value;

  let list=players.filter(p=>{
    if(search&&!((p.nom||'').toLowerCase().includes(search)||(p.club||'').toLowerCase().includes(search)||(p.nat||'').toLowerCase().includes(search)||(p.notes||'').toLowerCase().includes(search)))return false;
    if(poste&&p.poste!==poste)return false;
    if(ageMax&&parseInt(p.age)>parseInt(ageMax))return false;
    if(vmMax&&parseFloat(p.vm)>parseFloat(vmMax))return false;
    if(starsFilter!==''){
      const sn=starsNum(p);
      if(starsFilter==='0'){if(sn!==null)return false;}
      else{if(!sn||sn<parseFloat(starsFilter))return false;}
    }
    return true;
  });

  const[key,dir]=sort.split('_');
  list.sort((a,b)=>{
    let va,vb;
    if(key==='stars'){va=starsNum(a)||-1;vb=starsNum(b)||-1;}
    else if(key==='date'){va=a.date||'0000';vb=b.date||'0000';}
    else if(key==='age'){va=parseInt(a.age)||0;vb=parseInt(b.age)||0;}
    else if(key==='vm'){va=parseFloat(a.vm)||0;vb=parseFloat(b.vm)||0;}
    else if(key==='evol'){va=(parseFloat(a.vm)||0)-(parseFloat(a.vm_add)||0);vb=(parseFloat(b.vm)||0)-(parseFloat(b.vm_add)||0);}
    else{va=(a.nom||'').toLowerCase();vb=(b.nom||'').toLowerCase();}
    if(va<vb)return dir==='asc'?-1:1;
    if(va>vb)return dir==='asc'?1:-1;
    return 0;
  });

  updateStats(list);
  document.getElementById('count-line').textContent=list.length+' joueur'+(list.length>1?'s':'')+(list.length!==players.length?' (filtré sur '+players.length+')':'');
  const tbody=document.getElementById('tbody');
  const empty=document.getElementById('empty-state');
  if(!list.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';

  tbody.innerHTML=list.map((p,i)=>{
    const bc='badge badge-'+(p.poste||'').toLowerCase();
    const vmActu=parseFloat(p.vm)||0;
    const vmAdd=parseFloat(p.vm_add)||0;
    const diff=vmActu-vmAdd;
    const evolHtml=diff>0?`<span class="evol-up">▲${diff.toFixed(1)}M</span>`:diff<0?`<span class="evol-dn">▼${Math.abs(diff).toFixed(1)}M</span>`:`<span style="color:#bbb;font-size:11px">—</span>`;
    const ageN=parseInt(p.age);
    const ageWarn=ageN>23?'<span class="age-warn"> ⚠</span>':'';
    const styleClean=(p.style||'').replace(/^[\d\.]+★\s*/,'');
    return`<tr>
      <td style="color:#bbb;font-size:11px">${i+1}</td>
      <td style="font-weight:500;white-space:nowrap">${p.nom||'—'}</td>
      <td><span class="${bc}">${p.poste||'—'}</span></td>
      <td>${p.age||'—'}${ageWarn}</td>
      <td>${starsDisplay(p)}</td>
      <td style="white-space:nowrap;font-size:12px">${p.club||'—'}</td>
      <td style="font-size:12px">${p.nat||'—'}</td>
      <td class="vm-cell">${fmt(p.vm_add)}</td>
      <td class="vm-cell">${fmt(p.vm)}</td>
      <td class="vm-cell">${evolHtml}</td>
      <td class="notes-cell" title="${styleClean.replace(/"/g,'&quot;')}">${styleClean||'—'}</td>
      <td class="notes-cell" title="${(p.notes||'').replace(/"/g,'&quot;')}">${p.notes||'—'}</td>
      <td style="white-space:nowrap;color:#888;font-size:12px">${fmtDate(p.date)}</td>
      <td style="white-space:nowrap">
        <button class="btn" style="padding:4px 8px;font-size:12px;margin-right:4px" onclick="editPlayer('${p.id}')">✏</button>
        <button class="btn danger" style="padding:4px 8px;font-size:12px" onclick="deletePlayer('${p.id}')">✕</button>
      </td>
    </tr>`;
  }).join('');
}

function openModal(id){
  editId=id||null;
  const p=id?players.find(x=>x.id===id):null;
  document.getElementById('modal-title').textContent=p?'Modifier — '+p.nom:'Nouveau joueur';
  document.getElementById('f-nom').value=p?.nom||'';
  document.getElementById('f-fposte').value=p?.poste||'';
  document.getElementById('f-fage').value=p?.age||'';
  const sn=p?starsNum(p):null;
  document.getElementById('f-fstars').value=sn||'';
  document.getElementById('f-fnat').value=p?.nat||'';
  document.getElementById('f-fclub').value=p?.club||'';
  document.getElementById('f-fvmadd').value=p?.vm_add||'';
  document.getElementById('f-fvm').value=p?.vm||'';
  document.getElementById('f-fdate').value=p?.date||new Date().toISOString().split('T')[0];
  const styleClean=(p?.style||'').replace(/^[\d\.]+★\s*/,'');
  document.getElementById('f-fstyle').value=styleClean;
  document.getElementById('f-fnotes').value=p?.notes||'';
  document.getElementById('age-warn').style.display='none';
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none';}
function bgClick(e){if(e.target.id==='modal')closeModal();}
function checkAge(){
  const v=parseInt(document.getElementById('f-fage').value);
  document.getElementById('age-warn').style.display=(v&&v>23)?'block':'none';
}
function editPlayer(id){load();openModal(id);}
function deletePlayer(id){
  if(!confirm('Supprimer ce joueur ?'))return;
  load();players=players.filter(p=>p.id!==id);save();render();showToast('Joueur supprimé');
}
function savePlayer(){
  const nom=document.getElementById('f-nom').value.trim();
  const poste=document.getElementById('f-fposte').value;
  if(!nom||!poste){alert('Le nom et le poste sont obligatoires.');return;}
  load();
  const starsVal=document.getElementById('f-fstars').value;
  const styleText=document.getElementById('f-fstyle').value.trim();
  const styleField=starsVal?(starsVal+'★'+(styleText?' '+styleText:'')):styleText;
  const obj={
    id:editId||Date.now().toString(36)+Math.random().toString(36).slice(2,5),
    nom,poste,
    age:document.getElementById('f-fage').value,
    nat:document.getElementById('f-fnat').value.trim(),
    club:document.getElementById('f-fclub').value.trim(),
    vm_add:document.getElementById('f-fvmadd').value,
    vm:document.getElementById('f-fvm').value,
    date:document.getElementById('f-fdate').value,
    style:styleField,
    notes:document.getElementById('f-fnotes').value.trim()
  };
  if(editId){const i=players.findIndex(p=>p.id===editId);if(i>=0)players[i]=obj;}
  else players.push(obj);
  save();closeModal();render();showToast(editId?'Joueur modifié':'Joueur ajouté !');
}

document.getElementById('date-display').textContent='Mis à jour le '+new Date().toLocaleDateString('fr-FR');
load();
if(players.length===0){
  document.getElementById('empty-state').style.display='block';
  document.getElementById('empty-state').textContent='Clique sur "Charger ma liste" pour importer tes 245 joueurs !';
}
render();
</script>
</body>
</html>
